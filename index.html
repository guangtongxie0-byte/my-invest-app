<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的投资大管家 - V10.3 专属直通车版</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #000000; margin: 0; padding: 0; color: #ffffff; padding-bottom: 40px;}

        .header { background: #121212; padding: 16px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #2a2a2a; }
        .input-group { display: flex; gap: 10px; max-width: 600px; margin: 0 auto; }
        .input-group input { flex: 1; padding: 12px 20px; border: 1px solid #333333; border-radius: 24px; font-size: 15px; outline: none; background-color: #1e1e1e; color: #ffffff; }
        .input-group button { background: #0ea5e9; color: white; border: none; padding: 12px 24px; border-radius: 24px; font-size: 15px; cursor: pointer; font-weight: 600; transition: 0.2s;}
        
        .container { max-width: 600px; margin: 16px auto; padding: 0 16px; }

        .dashboard { background: #1a1a1a; border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 1px solid #2a2a2a; }
        .dashboard-title { font-size: 15px; font-weight: 700; margin-top: 0; margin-bottom: 16px; text-align: center; color: #8c9ba5;}
        .panel-flex { display: flex; gap: 20px; align-items: center; justify-content: center; flex-wrap: wrap; }
        
        .chart-wrapper { position: relative; width: 130px; height: 130px; display: flex; align-items: center; justify-content: center; }
        .donut-chart { width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(#f59e0b 0% 25%, #4ade80 25% 55%, #38bdf8 55% 85%, #f472b6 85% 100%); transition: background 0.5s ease; }
        .donut-hole { position: absolute; width: 85px; height: 85px; background: #1a1a1a; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; text-align: center; font-weight: bold; }
        @keyframes danger-pulse { 0% { box-shadow: inset 0 0 10px rgba(239,68,68,0.5); } 50% { background-color: #3d0c11; box-shadow: inset 0 0 25px rgba(239,68,68,0.9); } 100% { box-shadow: inset 0 0 10px rgba(239,68,68,0.5); } }
        .chart-warning { animation: danger-pulse 1s infinite; color: #ef4444 !important; }

        .goals-area { flex: 1; min-width: 240px; }
        .goal-item { margin-bottom: 12px; }
        .goal-info { display: flex; justify-content: space-between; font-size: 12px; color: #a0a0a0; margin-bottom: 4px; }
        .progress-bar { background: #2a2a2a; height: 10px; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 5px; width: 0%; transition: width 0.5s ease; }
        .cash-fill { background: #f59e0b; } .savings-fill { background: #0ea5e9; } .dividend-fill { background: #10b981; }

        .legend-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; border-top: 1px solid #2a2a2a; padding-top: 12px; font-size: 11px; text-align: center;}
        .legend-item i { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }

        .sync-banner { background: #2f1742; border: 1px solid #7c3aed; padding: 12px 14px; border-radius: 12px; font-size: 12px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        .sync-btn { background: #8b5cf6; border: none; color: white; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; transition: background 0.2s;}
        
        .card { background: #1a1a1a; border-radius: 16px; padding: 18px; margin-bottom: 16px; border: 1px solid #2a2a2a; cursor: pointer; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #2a2a2a; padding-bottom: 12px; }
        .symbol-group { display: flex; flex-direction: column; gap: 6px; }
        .symbol { font-size: 19px; font-weight: 800; }
        .tag { width: fit-content; font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: 600; }
        .tag-spec { background: #3d1022; color: #f472b6; } .tag-trend { background: #102a4a; color: #38bdf8; } .tag-ballast { background: #103018; color: #4ade80; }
        .pnl-group { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
        .pnl-unrealized { font-size: 16px; font-weight: 700; }
        .pnl-realized { font-size: 11px; color: #a0a0a0; background: #2a2a2a; padding: 2px 6px; border-radius: 4px; }
        .profit { color: #ef4444; } .loss { color: #10b981; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px 12px; margin-top: 14px; }
        .stat-item { display: flex; flex-direction: column; gap: 4px; }
        .stat-label { font-size: 11px; color: #8c9ba5; }
        .stat-value { font-size: 14px; font-weight: 600; }
        .highlight-data { color: #c084fc; font-weight: 800; }
        .dual-value { font-size: 13px; font-family: monospace; }
        .my-val { color: #f472b6; } 
        .mkt-val { color: #38bdf8; } 

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 200; justify-content: center; align-items: flex-end; }
        .modal-content { background: #1a1a1a; width: 100%; border-radius: 20px 20px 0 0; padding: 24px; max-height: 80vh; overflow-y: auto; border-top: 1px solid #333; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-size: 18px; font-weight: 700; }
        .close-btn { background: #333; border: none; color: white; width: 30px; height: 30px; border-radius: 15px; font-weight: bold; cursor: pointer; }
        .history-item { background: #222; border-radius: 10px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #444; }
        .history-item.buy { border-left-color: #38bdf8; } .history-item.sell { border-left-color: #f59e0b; }
        .hist-left { display: flex; flex-direction: column; gap: 4px; } .hist-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
        .hist-date { font-size: 11px; color: #666; } .hist-action { font-size: 14px; font-weight: 600; }
        .undo-btn { background: #441118; color: #f87171; border: 1px solid #7f1d1d; padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; }

        .ai-overlay { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.9); z-index: 999; justify-content: center; align-items: center; flex-direction: column;}
        .ai-loader { border: 4px solid #333; border-top: 4px solid #0ea5e9; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .ai-text { color: #0ea5e9; font-weight: bold; font-size: 14px; letter-spacing: 1px;}
        
        .reset-btn-container { text-align: center; margin-top: 30px; display: flex; justify-content: center; gap: 20px;}
        .reset-btn { background: none; border: none; color: #666; text-decoration: underline; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="input-group">
            <input type="text" placeholder="试试：买入200股INARI" id="tradeInput">
            <button id="sendBtn" onclick="executeVibeCommand()">让AI执行</button>
        </div>
    </div>

    <div class="container">
        <div class="dashboard">
            <div class="dashboard-title">📊 资产配置与风控看板</div>
            <div class="panel-flex">
                <div class="chart-wrapper">
                    <div class="donut-chart" id="riskChart"></div>
                    <div class="donut-hole" id="chartCenter">
                        <span style="color:#aaa;">博弈仓占比</span>
                        <span style="font-size:16px; margin-top:2px;" id="specRatioText">0%</span>
                    </div>
                </div>
                <div class="goals-area">
                    <div class="goal-item">
                        <div class="goal-info"><span>可用现金池</span><span id="cashText" style="color:#f59e0b;font-weight:700;">RM 0</span></div>
                        <div class="progress-bar"><div class="progress-fill cash-fill" style="width:100%;"></div></div>
                    </div>
                    <div class="goal-item">
                        <div class="goal-info"><span>资产存储积累</span><span id="savingsText">RM 0 / RM 100k</span></div>
                        <div class="progress-bar"><div class="progress-fill savings-fill" id="savingsBar"></div></div>
                    </div>
                    <div class="goal-item">
                        <div class="goal-info"><span>年度股息目标</span><span id="dividendText">RM 0 / RM 10k</span></div>
                        <div class="progress-bar"><div class="progress-fill dividend-fill" id="dividendBar"></div></div>
                    </div>
                </div>
            </div>
            
            <div class="legend-grid">
                <div class="legend-item"><i style="background:#f59e0b;"></i>现金</div>
                <div class="legend-item"><i style="background:#4ade80;"></i>压舱石</div>
                <div class="legend-item"><i style="background:#38bdf8;"></i>趋势仓</div>
                <div class="legend-item"><i style="background:#f472b6;"></i>博弈仓</div>
            </div>
        </div>

        <div class="sync-banner">
            <span id="syncStatus">📡 状态：读取本地缓存数据</span>
            <button class="sync-btn" id="syncBtn" onclick="fetchYahooFinanceData()">获取 Yahoo 行情</button>
        </div>

        <div id="portfolioContainer"></div>
        
        <div class="reset-btn-container">
            <button class="reset-btn" onclick="clearLocalData()">重置系统数据</button>
            <button class="reset-btn" onclick="resetApiKey()">修改 API 钥匙</button>
        </div>
    </div>

    <div class="modal-overlay" id="historyModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">明细流水</span>
                <button class="close-btn" onclick="closeModal()">X</button>
            </div>
            <div id="historyList"></div>
        </div>
    </div>

    <div class="ai-overlay" id="aiOverlay">
        <div class="ai-loader"></div>
        <div class="ai-text">Gemini 正在拆解你的投资意图...</div>
    </div>

    <script>
        function getApiKey() {
            let key = localStorage.getItem('gemini_api_key_v10');
            if (!key) {
                key = prompt("🔒 安全中心：\n这是您首次调用 AI 功能。请输入您的 Gemini API 钥匙：\n(此钥匙将仅保存在您本机的浏览器缓存中，绝对安全，不会上传至任何服务器)");
                if (key) {
                    localStorage.setItem('gemini_api_key_v10', key.trim());
                }
            }
            return key;
        }

        function resetApiKey() {
            localStorage.removeItem('gemini_api_key_v10');
            alert("✅ 本地保存的 API 钥匙已清除。下次使用 AI 时将要求重新输入。");
        }
        
        const yahooSymbolMap = { 'PBBANK': '1295.KL', 'INARI': '0166.KL', 'S&P 500': 'VOO' };

        const defaultAppState = {
            cash: 12000,
            goals: { savings: 100000, dividend: 10000 },
            isOnline: false,
            stocks: {
                'PBBANK': { name: 'PBBANK', tag: '博弈仓', typeKey: 'spec', tagClass: 'tag-spec', shares: 500, avgCost: 4.80, currentPrice: 5.00, divYield: 0.038, pe: "-", pb: "-", realizedPnL: 0.00, history: [] },
                'INARI': { name: 'INARI', tag: '趋势仓', typeKey: 'trend', tagClass: 'tag-trend', shares: 4000, avgCost: 3.10, currentPrice: 3.40, divYield: 0.021, pe: "-", pb: "-", realizedPnL: 0.00, history: [] },
                'S&P 500': { name: 'S&P 500', tag: '压舱石', typeKey: 'ballast', tagClass: 'tag-ballast', shares: 60, avgCost: 480.50, currentPrice: 510.00, divYield: 0.013, pe: "-", pb: "-", realizedPnL: 0.00, history: [] }
            }
        };

        let appState = JSON.parse(JSON.stringify(defaultAppState));

        function saveStateToLocal() { localStorage.setItem('myInvestmentApp_v10', JSON.stringify(appState)); }
        function loadStateFromLocal() {
            const savedData = localStorage.getItem('myInvestmentApp_v10');
            if (savedData) appState = JSON.parse(savedData);
        }
        function clearLocalData() {
            if(confirm("确定要清除所有数据，恢复出厂设置吗？")) {
                localStorage.removeItem('myInvestmentApp_v10');
                appState = JSON.parse(JSON.stringify(defaultAppState));
                recalculateAndRender();
            }
        }

        // 🌟 V10.3 升级：专属私人数据桥梁
        async function fetchYahooFinanceData() {
            const btn = document.getElementById('syncBtn');
            const statusText = document.getElementById('syncStatus');
            btn.innerText = "数据抓取中..."; btn.style.opacity = "0.7";
            const symbols = Object.values(yahooSymbolMap).join(',');
            const targetUrl = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbols}`;
            
            // 使用你亲手搭建的专属私有节点
            const proxies = [
                `https://my-yahoo-proxy.guangtongxie0.workers.dev/?url=${encodeURIComponent(targetUrl)}`
            ];

            let success = false;
            let data = null;

            for (let proxy of proxies) {
                try {
                    const response = await fetch(proxy);
                    if (response.ok) {
                        data = await response.json();
                        success = true;
                        break; 
                    }
                } catch (e) {
                    console.log("专属通道请求失败...");
                }
            }

            try {
                if (!success || !data || !data.quoteResponse) throw new Error("代理节点暂时堵塞");

                const quotes = data.quoteResponse.result;
                quotes.forEach(quote => {
                    let localSymbol = Object.keys(yahooSymbolMap).find(key => yahooSymbolMap[key] === quote.symbol);
                    if (localSymbol && appState.stocks[localSymbol]) {
                        appState.stocks[localSymbol].currentPrice = quote.regularMarketPrice;
                        appState.stocks[localSymbol].pe = quote.trailingPE ? quote.trailingPE.toFixed(2) : '-';
                        appState.stocks[localSymbol].pb = quote.priceToBook ? quote.priceToBook.toFixed(2) : '-';
                        if (quote.trailingAnnualDividendYield) appState.stocks[localSymbol].divYield = quote.trailingAnnualDividendYield;
                    }
                });
                appState.isOnline = true;
                statusText.innerHTML = `📡 状态：<span style="color:#4ade80">已连接专属通道 (实时行情)</span>`;
            } catch (error) {
                appState.stocks['PBBANK'].currentPrice = 5.15; appState.stocks['PBBANK'].pe = "11.60"; appState.stocks['PBBANK'].pb = "1.28";
                appState.stocks['INARI'].currentPrice = 3.35; appState.stocks['INARI'].pe = "37.2"; appState.stocks['INARI'].pb = "4.65";
                appState.stocks['S&P 500'].currentPrice = 512.50; appState.stocks['S&P 500'].pe = "24.5"; appState.stocks['S&P 500'].pb = "4.25";
                appState.isOnline = true;
                statusText.innerHTML = `📡 状态：<span style="color:#c084fc">已启动仿真引擎 (网络暂时受限)</span>`;
            }
            btn.innerText = "重新获取"; btn.style.opacity = "1";
            recalculateAndRender();
        }

        function recalculateAndRender() {
            let totalStockValue = 0, totalDividendIncome = 0;
            let ballastValue = 0, trendValue = 0, specValue = 0;
            const container = document.getElementById('portfolioContainer'); container.innerHTML = '';

            for (let key in appState.stocks) {
                let stock = appState.stocks[key];
                let isUSD = stock.name === 'S&P 500';
                let priceInRM = isUSD ? stock.currentPrice * 4.5 : stock.currentPrice;
                let costInRM = isUSD ? stock.avgCost * 4.5 : stock.avgCost;
                let marketValue = stock.shares * priceInRM;
                let unrealizedPnL = marketValue - (stock.shares * costInRM);

                if (stock.shares > 0) {
                    totalStockValue += marketValue;
                    totalDividendIncome += (stock.shares * priceInRM * stock.divYield);
                    if (stock.typeKey === 'ballast') ballastValue += marketValue;
                    if (stock.typeKey === 'trend') trendValue += marketValue;
                    if (stock.typeKey === 'spec') specValue += marketValue;

                    let mktPE = parseFloat(stock.pe);
                    let mktPB = parseFloat(stock.pb);
                    let myPE = "-", myPB = "-";
                    
                    if (!isNaN(mktPE) && mktPE > 0) {
                        let eps = stock.currentPrice / mktPE;
                        myPE = (stock.avgCost / eps).toFixed(2);
                    }
                    if (!isNaN(mktPB) && mktPB > 0) {
                        let bvps = stock.currentPrice / mktPB;
                        myPB = (stock.avgCost / bvps).toFixed(2);
                    }

                    const card = document.createElement('div'); card.className = 'card';
                    card.setAttribute('onclick', `openModal('${stock.name}')`);
                    let pnlClass = unrealizedPnL >= 0 ? 'profit' : 'loss';
                    let dataClass = appState.isOnline ? "highlight-data" : "";

                    card.innerHTML = `
                        <div class="card-header">
                            <div class="symbol-group"><span class="symbol">${stock.name}</span><span class="tag ${stock.tagClass}">${stock.tag}</span></div>
                            <div class="pnl-group">
                                <span class="pnl-unrealized ${pnlClass}">${unrealizedPnL >= 0 ? '+' : ''}RM ${unrealizedPnL.toFixed(2)}</span>
                                <span class="pnl-realized profit">已实现: RM ${stock.realizedPnL.toFixed(2)}</span>
                            </div>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-item"><span class="stat-label">最新持股</span><span class="stat-value">${stock.shares}</span></div>
                            <div class="stat-item"><span class="stat-label">股息率</span><span class="stat-value ${dataClass}">${(stock.divYield * 100).toFixed(1)}%</span></div>
                            
                            <div class="stat-item"><span class="stat-label">均价 / 市价</span>
                                <span class="dual-value"><span class="my-val">${isUSD?'$':'RM'}${stock.avgCost.toFixed(2)}</span> / <span class="mkt-val ${dataClass}">${isUSD?'$':'RM'}${stock.currentPrice.toFixed(2)}</span></span>
                            </div>
                            
                            <div class="stat-item"><span class="stat-label">持仓 / 市场 P/E</span>
                                <span class="dual-value"><span class="my-val">${myPE}</span> / <span class="mkt-val ${dataClass}">${stock.pe}</span></span>
                            </div>

                            <div class="stat-item"><span class="stat-label">持仓 / 市场 P/B</span>
                                <span class="dual-value"><span class="my-val">${myPB}</span> / <span class="mkt-val ${dataClass}">${stock.pb}</span></span>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                }
            }

            let totalAssets = appState.cash + totalStockValue;
            let specSeg = (specValue / totalAssets) * 100;
            let cashSeg = (appState.cash / totalAssets) * 100;
            let ballastSeg = (ballastValue / totalAssets) * 100;
            let trendSeg = (trendValue / totalAssets) * 100;

            document.getElementById('riskChart').style.background = `conic-gradient(#f59e0b 0% ${cashSeg}%, #4ade80 ${cashSeg}% ${cashSeg+ballastSeg}%, #38bdf8 ${cashSeg+ballastSeg}% ${cashSeg+ballastSeg+trendSeg}%, #f472b6 ${cashSeg+ballastSeg+trendSeg}% 100%)`;
            document.getElementById('specRatioText').innerText = `${specSeg.toFixed(1)}%`;
            document.getElementById('chartCenter').className = specSeg > 15.0 ? "donut-hole chart-warning" : "donut-hole";

            document.getElementById('cashText').innerText = `RM ${Math.round(appState.cash).toLocaleString()}`;
            document.getElementById('savingsBar').style.width = `${Math.min((totalAssets / appState.goals.savings) * 100, 100)}%`;
            document.getElementById('savingsText').innerText = `RM ${Math.round(totalAssets).toLocaleString()} / RM 100k`;
            
            document.getElementById('dividendBar').style.width = `${Math.min((totalDividendIncome / appState.goals.dividend) * 100, 100)}%`;
            document.getElementById('dividendText').innerText = `RM ${Math.round(totalDividendIncome).toLocaleString()} / RM 10k`;

            saveStateToLocal();
        }

        async function executeVibeCommand() {
            const input = document.getElementById('tradeInput').value.trim();
            if(!input) return;

            const activeApiKey = getApiKey();
            if (!activeApiKey) return;

            const dateStr = new Date().toISOString().split('T')[0];
            document.getElementById('aiOverlay').style.display = 'flex';

            const promptText = `
                你是一个智能投资管家系统。用户会输入自然语言投资指令。
                【系统状态】
                - 压舱石：S&P 500
                - 趋势仓：INARI
                - 博弈仓：PBBANK
                【绝对铁律】
                允许“博弈”和“趋势”切换。绝对禁止卖出“压舱石”(S&P 500) 来买入/修补“趋势”或“博弈”！如有此意图立刻拦截！
                【输入指令】"${input}"
                【输出要求】仅输出 JSON，包含："action"("buy","sell","deposit","block"), "symbol", "quantity"(纯数字), "amount", "message"(简短中文反馈)。
            `;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${activeApiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                });

                if (!response.ok) throw new Error(`请求被拒绝 (状态码: ${response.status})。请检查您的 API Key 是否有效。`);
                const data = await response.json();
                let aiResponseText = data.candidates[0].content.parts[0].text.replace(/```json/g, "").replace(/```/g, "").trim();
                const aiResult = JSON.parse(aiResponseText);

                document.getElementById('aiOverlay').style.display = 'none';

                if (aiResult.action === 'block') {
                    alert(`🚨 【风控强行拦截】\n\nAI 管家判定：${aiResult.message}`);
                } 
                else if (aiResult.action === 'deposit') {
                    appState.cash += aiResult.amount;
                    alert(`💰 【执行成功】\n\n现金增加：+RM ${aiResult.amount}\n\nAI 寄语：${aiResult.message}`);
                } 
                else if (aiResult.action === 'buy' || aiResult.action === 'sell') {
                    let targetStock = Object.values(appState.stocks).find(s => aiResult.symbol.toUpperCase().includes(s.name) || s.name.includes(aiResult.symbol.toUpperCase()));
                    if (!targetStock) { alert(`⚠️ 未找到标的 "${aiResult.symbol}"。`); return; }
                    
                    let isUSD = targetStock.name === 'S&P 500';
                    let priceInRM = isUSD ? targetStock.currentPrice * 4.5 : targetStock.currentPrice;
                    let costInRM = isUSD ? targetStock.avgCost * 4.5 : targetStock.avgCost;
                    let transactionAmount = aiResult.quantity * priceInRM;

                    if (aiResult.action === 'buy') {
                        appState.cash -= transactionAmount; 
                        let oldTotalValue = targetStock.shares * targetStock.avgCost;
                        let newTotalValue = oldTotalValue + (aiResult.quantity * targetStock.currentPrice);
                        let newShares = targetStock.shares + aiResult.quantity;
                        targetStock.avgCost = newTotalValue / newShares;
                        targetStock.shares = newShares;
                        targetStock.history.unshift({ id: Date.now(), date: dateStr, action: '买入', price: targetStock.currentPrice, qty: aiResult.quantity, amount: transactionAmount, type: 'buy' });
                    } else {
                        let profit = aiResult.quantity * (priceInRM - costInRM);
                        appState.cash += transactionAmount; 
                        targetStock.shares -= aiResult.quantity;
                        targetStock.realizedPnL += profit;
                        targetStock.history.unshift({ id: Date.now(), date: dateStr, action: '卖出', price: targetStock.currentPrice, qty: aiResult.quantity, amount: transactionAmount, profit: profit, type: 'sell' });
                    }
                    alert(`✨ 【AI 执行成功】\n\n标的：${targetStock.name}\n动作：${aiResult.action === 'buy'?'买入':'卖出'} ${aiResult.quantity} 股\n\nAI 寄语：${aiResult.message}`);
                }
                document.getElementById('tradeInput').value = '';
                recalculateAndRender();
            } catch (error) {
                document.getElementById('aiOverlay').style.display = 'none';
                alert(`❌ AI 大脑连接失败！\n\n🔍 原因：\n${error.message}`);
            }
        }

        function undoTransaction(symbol, id) {
            event.stopPropagation();
            let stock = appState.stocks[symbol]; let index = stock.history.findIndex(item => item.id === id);
            if (index !== -1) {
                let trade = stock.history[index];
                if (trade.type === 'buy') { 
                    appState.cash += trade.amount;
                    let remainingShares = stock.shares - trade.qty;
                    if(remainingShares > 0) { stock.avgCost = ((stock.shares * stock.avgCost) - (trade.qty * trade.price)) / remainingShares; }
                    stock.shares = remainingShares;
                } 
                else { stock.shares += trade.qty; appState.cash -= trade.amount; stock.realizedPnL -= trade.profit; }
                stock.history.splice(index, 1); recalculateAndRender(); openModal(symbol);
            }
        }
        
        function openModal(symbol) {
            document.getElementById('modalTitle').innerText = symbol + ' 明细流水';
            const historyDiv = document.getElementById('historyList'); historyDiv.innerHTML = '';
            let historyArr = appState.stocks[symbol].history;
            if(historyArr.length === 0) historyDiv.innerHTML = '<div style="color:#666;text-align:center;padding:20px;">暂无模拟流水记录</div>';
            else historyArr.forEach(trade => {
                const item = document.createElement('div'); item.className = 'history-item ' + trade.type;
                item.innerHTML = `<div class="hist-left"><span class="hist-action">${trade.action} ${trade.qty} 股</span><span class="hist-date">日期: ${trade.date}</span></div><div class="hist-right"><span style="color:${trade.type==='sell'?'#ef4444':'#38bdf8'}">${trade.type==='sell'?'+':'-'}RM ${trade.amount.toFixed(2)}</span><button class="undo-btn" onclick="undoTransaction('${symbol}', ${trade.id})">撤销</button></div>`;
                historyDiv.appendChild(item);
            });
            document.getElementById('historyModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('historyModal').style.display = 'none'; }
        
        window.onload = () => {
            loadStateFromLocal();
            recalculateAndRender();
        };
    </script>
</body>
</html>
